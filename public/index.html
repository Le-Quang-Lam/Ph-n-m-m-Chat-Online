<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Online Chat - Crystal Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      }

      body {
        background: url("img/titan.jpg") no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(0, 0, 0, 0.2) 100%
        );
        z-index: 0;
      }

      .app {
        position: relative;
        z-index: 1;
        width: 900px;
        height: 85vh;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        display: flex;
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .users {
        width: 260px;
        background: rgba(255, 255, 255, 0.05);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
      }

      .users-header {
        padding: 30px 20px;
        background: rgba(255, 255, 255, 0.1);
      }

      .users-header h3 {
        color: #fff;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 3px;
        display: flex;
        align-items: center;
        gap: 10px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      }

      #userList li {
        padding: 18px 25px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.3s ease;
        cursor: pointer;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }

      #userList li:hover {
        background: rgba(255, 255, 255, 0.1);
        padding-left: 32px;
      }

      .online-dot {
        width: 8px;
        height: 8px;
        background: #00ffcc;
        border-radius: 50%;
        box-shadow: 0 0 10px #00ffcc;
      }

      .chat {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: rgba(255, 255, 255, 0.05);
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logout-btn {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 8px 18px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        transition: 0.3s;
      }

      .logout-btn:hover {
        background: #ff4757;
        border-color: #ff4757;
        box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .message {
        padding: 12px 18px;
        border-radius: 22px;
        max-width: 75%;
        font-size: 14.5px;
        backdrop-filter: blur(10px);
      }

      .me {
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
      }

      .other {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .input-box {
        padding: 25px 30px;
        display: flex;
        gap: 15px;
        background: rgba(0, 0, 0, 0.05);
      }

      input {
        flex: 1;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 15px 25px;
        border-radius: 50px;
        outline: none;
        color: #fff;
        transition: 0.3s;
      }

      input:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #00d2ff;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
      }

      .send-btn {
        background: #fff;
        color: #333;
        border: none;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
      }

      .send-btn:hover {
        transform: scale(1.1) rotate(-10deg);
        background: #00d2ff;
        color: #fff;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="users">
        <div class="users-header">
          <h3><span class="online-dot"></span> ONLINE</h3>
        </div>
        <ul id="userList"></ul>
      </div>

      <div class="chat">
        <div class="header">
          <div
            style="
              font-weight: 800;
              color: #fff;
              letter-spacing: 2px;
              font-size: 14px;
            "
          >
            PHÒNG CHAT CHUNG
          </div>
          <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-box">
          <input id="msg" placeholder="Nhập tin nhắn..." autocomplete="off" />
          <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const socket = io();
      const username = localStorage.getItem("username");
      if (!username) {
        window.location = "login.html";
      }

      socket.emit("join", username);

      socket.on("load history", (data) => {
        const msgContainer = document.getElementById("messages");
        msgContainer.innerHTML = "";

        data.forEach((msg) => {
          hienThiTinNhan({ user: msg.NguoiGui, text: msg.NoiDung });
        });
      });

      function send() {
        const input = document.getElementById("msg");
        const msg = input.value;
        if (msg.trim() === "") return;
        socket.emit("chat message", { user: username, text: msg });
        input.value = "";
      }

      function hienThiTinNhan(data) {
        const div = document.createElement("div");
        div.classList.add("message");
        const isMe = data.user === username;
        div.classList.add(isMe ? "me" : "other");
        div.innerHTML =
          `<span style="font-size:10px; font-weight:bold; display:block; margin-bottom:4px; opacity:0.7">${isMe ? "Bạn" : data.user}</span>` +
          data.text;
        document.getElementById("messages").appendChild(div);
        const msgContainer = document.getElementById("messages");
        msgContainer.scrollTop = msgContainer.scrollHeight;
      }

      socket.on("chat message", (data) => {
        hienThiTinNhan(data);
      });

      socket.on("user list", (users) => {
        const ul = document.getElementById("userList");
        ul.innerHTML = "";
        users.forEach((u) => {
          const li = document.createElement("li");
          li.innerHTML = `<span class="online-dot"></span> ${u}`;
          ul.appendChild(li);
        });
      });

      document.getElementById("msg").addEventListener("keypress", (e) => {
        if (e.key === "Enter") send();
      });

      function logout() {
        localStorage.removeItem("username");
        window.location = "login.html";
      }
    </script>
  </body>
</html>
